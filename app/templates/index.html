<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoSignal — Live Trading Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f1e2cb;
    --white: #fdf6ee;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e8e6df;
    --text: #1a1a2e;
    --muted: #8a8a9a;
    --buy: #00b87a;
    --buy-bg: #e6f8f2;
    --buy-border: #b3ecd8;
    --sell: #ff4d6d;
    --sell-bg: #fff0f3;
    --sell-border: #ffb3c1;
    --hold: #7c6af7;
    --hold-bg: #f0eeff;
    --hold-border: #c9c0fa;
    --accent: #6c63ff;
    --yellow: #ffd166;
    --yellow-bg: #fff9e6;
    --radius: 20px;
    --radius-sm: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 24px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .mono { font-family: 'DM Mono', monospace; }

  /* ── HEADER ── */
  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.03em;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #6c63ff, #a78bfa);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .header-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.4rem 1rem;
    font-size: 0.78rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .header-pill strong { color: var(--text); font-weight: 600; }

  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--buy);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .refresh-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 999px;
    padding: 0.5rem 1.25rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .refresh-btn:hover { opacity: 0.88; }
  .refresh-btn:active { transform: scale(0.97); }
  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SUMMARY STRIP ── */
  .summary-strip {
    padding: 1.5rem 2.5rem 0;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1rem;
  }

  .summary-tile {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: transform 0.2s;
  }
  .summary-tile:hover { transform: translateY(-2px); }

  .tile-label {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
  }

  .tile-value {
    font-size: 2rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
  }

  .tile-buy .tile-value { color: var(--buy); }
  .tile-sell .tile-value { color: var(--sell); }
  .tile-hold .tile-value { color: var(--hold); }
  .tile-conf .tile-value { color: var(--accent); }

  .tile-icon {
    font-size: 1.4rem;
    margin-bottom: 2px;
  }

  /* ── CONTROLS ── */
  .controls {
    padding: 1.25rem 2.5rem;
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 320px;
  }

  .search-icon-inner {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.95rem;
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    background: var(--white);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 0.75rem 0.6rem 2.6rem;
    border-radius: 999px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.875rem;
    outline: none;
    box-shadow: var(--shadow);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.12);
  }
  #searchInput::placeholder { color: var(--muted); }

  select {
    background: var(--white);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 1rem;
    border-radius: 999px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    outline: none;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: border-color 0.2s;
  }
  select:focus { border-color: var(--accent); }

  .filter-btns {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 0.5rem 1.1rem;
    border-radius: 999px;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--muted);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: var(--shadow);
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .filter-btn.buy-f.active { background: var(--buy); border-color: var(--buy); color: white; }
  .filter-btn.sell-f.active { background: var(--sell); border-color: var(--sell); color: white; }
  .filter-btn.hold-f.active { background: var(--hold); border-color: var(--hold); color: white; }

  /* ── GRID ── */
  #coinGrid {
    padding: 0 2.5rem 3rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 1.25rem;
  }

  /* ── COIN CARD ── */
  .coin-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    box-shadow: var(--shadow);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.35s ease both;
    position: relative;
    overflow: hidden;
  }
  .coin-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .coin-card.buy-card::before { background: linear-gradient(90deg, var(--buy), #4dd9a7); }
  .coin-card.sell-card::before { background: linear-gradient(90deg, var(--sell), #ff8fa3); }
  .coin-card.hold-card::before { background: linear-gradient(90deg, var(--hold), #a78bfa); }

  .coin-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Card top */
  .card-top {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .coin-logo {
    width: 44px; height: 44px;
    border-radius: 14px;
    object-fit: contain;
    background: var(--surface2);
    border: 1px solid var(--border);
    flex-shrink: 0;
    padding: 2px;
  }

  .coin-logo-placeholder {
    width: 44px; height: 44px;
    border-radius: 14px;
    background: linear-gradient(135deg, #e0d9ff, #c9c0fa);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 0.85rem; color: var(--hold);
    flex-shrink: 0;
  }

  .coin-name-wrap { flex: 1; min-width: 0; }
  .coin-name {
    font-weight: 700;
    font-size: 0.95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .coin-ticker {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .coin-rank {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px 8px;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
  }

  /* Price row */
  .price-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .coin-price {
    font-family: 'DM Mono', monospace;
    font-size: 1.3rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .change-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 8px;
  }
  .change-pos { background: var(--buy-bg); color: var(--buy); border: 1px solid var(--buy-border); }
  .change-neg { background: var(--sell-bg); color: var(--sell); border: 1px solid var(--sell-border); }
  .change-neu { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  /* Metrics */
  .metrics-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .metric {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
  }
  .metric-label {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .metric-value {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text);
  }

  /* Signal button */
  .signal-btn {
    width: 100%;
    padding: 0.9rem;
    border-radius: var(--radius-sm);
    border: none;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 800;
    letter-spacing: 0.05em;
    cursor: default;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .signal-BUY {
    background: var(--buy-bg);
    color: var(--buy);
    border: 2px solid var(--buy-border);
  }
  .signal-SELL {
    background: var(--sell-bg);
    color: var(--sell);
    border: 2px solid var(--sell-border);
  }
  .signal-HOLD {
    background: var(--hold-bg);
    color: var(--hold);
    border: 2px solid var(--hold-border);
  }

  /* Confidence */
  .conf-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .conf-label { font-size: 0.7rem; font-weight: 600; color: var(--muted); width: 65px; flex-shrink: 0; }
  .conf-track {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 999px;
    overflow: hidden;
  }
  .conf-fill { height: 100%; border-radius: 999px; transition: width 0.8s ease; }
  .conf-fill-BUY  { background: linear-gradient(90deg, var(--buy), #4dd9a7); }
  .conf-fill-SELL { background: linear-gradient(90deg, var(--sell), #ff8fa3); }
  .conf-fill-HOLD { background: linear-gradient(90deg, var(--hold), #a78bfa); }
  .conf-value { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); width: 34px; text-align: right; flex-shrink: 0; }

  /* Explanation */
  .explanation {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.55;
    border-top: 1px solid var(--border);
    padding-top: 0.85rem;
  }

  /* Loading */
  #loadingState {
    grid-column: 1/-1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.25rem;
    padding: 5rem 2rem;
  }
  .spinner {
    width: 44px; height: 44px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-text { color: var(--muted); font-size: 0.9rem; font-weight: 500; }

  /* Empty */
  #emptyState {
    grid-column: 1/-1;
    text-align: center;
    padding: 5rem 2rem;
    color: var(--muted);
    display: none;
    font-size: 0.9rem;
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 1.5rem; right: 1.5rem;
    background: var(--text);
    color: white;
    padding: 0.7rem 1.2rem;
    border-radius: 999px;
    font-size: 0.82rem;
    font-weight: 600;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999;
    box-shadow: var(--shadow-md);
  }
  #toast.show { transform: translateY(0); opacity: 1; }

  /* Responsive */
  @media (max-width: 640px) {
    header, .summary-strip, .controls, #coinGrid { padding-left: 1rem; padding-right: 1rem; }
    .header-pill { display: none; }
    #coinGrid { grid-template-columns: 1fr; }
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📈</div>
    CryptoSignal
  </div>
  <div class="header-right">
    <div class="header-pill">
      <div class="live-dot"></div>
      <span><strong id="coinCount">—</strong> coins</span>
    </div>
    <div class="header-pill">
      🕐 <span>Update: <strong id="lastUpdate">—</strong></span>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">
      <svg id="refreshIcon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M3 21v-5h5"/>
      </svg>
      Vernieuwen
    </button>
  </div>
</header>

<div class="summary-strip">
  <div class="summary-tile tile-buy">
    <div class="tile-icon">🟢</div>
    <div class="tile-label">Koop</div>
    <div class="tile-value" id="buyCount">0</div>
  </div>
  <div class="summary-tile tile-hold">
    <div class="tile-icon">🟣</div>
    <div class="tile-label">Houden</div>
    <div class="tile-value" id="holdCount">0</div>
  </div>
  <div class="summary-tile tile-sell">
    <div class="tile-icon">🔴</div>
    <div class="tile-label">Verkoop</div>
    <div class="tile-value" id="sellCount">0</div>
  </div>
  <div class="summary-tile tile-conf">
    <div class="tile-icon">⚡</div>
    <div class="tile-label">Gem. confidence</div>
    <div class="tile-value" id="avgConf">0%</div>
  </div>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon-inner">🔍</span>
    <input type="text" id="searchInput" placeholder="Zoek coin of ticker…" oninput="applyFilters()">
  </div>
  <select id="sortSelect" onchange="applyFilters()">
    <option value="market_cap_rank">Market Cap</option>
    <option value="price_usd">Prijs</option>
    <option value="change_24h">24u verandering</option>
    <option value="confidence">Confidence</option>
    <option value="sentiment_score">Sentiment</option>
    <option value="name">Naam</option>
  </select>
  <select id="orderSelect" onchange="applyFilters()">
    <option value="asc">Oplopend ▲</option>
    <option value="desc">Aflopend ▼</option>
  </select>
  <div class="filter-btns">
    <button class="filter-btn active" data-filter="ALL" onclick="setSignalFilter('ALL')">Alle</button>
    <button class="filter-btn buy-f" data-filter="BUY" onclick="setSignalFilter('BUY')">🟢 Koop</button>
    <button class="filter-btn sell-f" data-filter="SELL" onclick="setSignalFilter('SELL')">🔴 Verkoop</button>
    <button class="filter-btn hold-f" data-filter="HOLD" onclick="setSignalFilter('HOLD')">🟣 Houden</button>
  </div>
</div>

<div id="coinGrid">
  <div id="loadingState">
    <div class="spinner"></div>
    <span class="loading-text">Marktdata ophalen…</span>
  </div>
  <div id="emptyState">
    <p style="font-size:2rem;margin-bottom:0.5rem">🔍</p>
    <p>Geen coins gevonden.</p>
  </div>
</div>

<div id="toast"></div>

<script>
let allCoins = [];
let signalFilter = 'ALL';

document.addEventListener('DOMContentLoaded', () => {
  loadCoins();
  setInterval(loadCoins, 60_000);
});

async function loadCoins() {
  try {
    const resp = await fetch('/api/coins?sort_by=market_cap_rank&order=asc');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    allCoins = data.coins || [];
    updateSummary(allCoins);
    applyFilters();
    document.getElementById('coinCount').textContent = allCoins.length;
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('nl-NL');
  } catch (err) {
    showToast('⚠️ Kon data niet laden');
    console.error(err);
  }
}

async function refreshData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  await loadCoins();
  btn.classList.remove('spinning');
  showToast('✅ Data vernieuwd');
}

function updateSummary(coins) {
  const buy  = coins.filter(c => c.signal === 'BUY').length;
  const sell = coins.filter(c => c.signal === 'SELL').length;
  const hold = coins.filter(c => c.signal === 'HOLD').length;
  const avgConf = coins.length
    ? Math.round(coins.reduce((s, c) => s + (c.confidence || 0), 0) / coins.length)
    : 0;
  document.getElementById('buyCount').textContent  = buy;
  document.getElementById('sellCount').textContent = sell;
  document.getElementById('holdCount').textContent = hold;
  document.getElementById('avgConf').textContent   = avgConf + '%';
}

function setSignalFilter(val) {
  signalFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === val);
  });
  applyFilters();
}

function applyFilters() {
  const q     = document.getElementById('searchInput').value.toLowerCase().trim();
  const sort  = document.getElementById('sortSelect').value;
  const order = document.getElementById('orderSelect').value;

  let filtered = allCoins.filter(c => {
    const matchSearch = !q || c.name.toLowerCase().includes(q) || c.symbol.toLowerCase().includes(q);
    const matchSignal = signalFilter === 'ALL' || c.signal === signalFilter;
    return matchSearch && matchSignal;
  });

  filtered.sort((a, b) => {
    let va = a[sort] ?? -Infinity;
    let vb = b[sort] ?? -Infinity;
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return order === 'asc' ? -1 : 1;
    if (va > vb) return order === 'asc' ? 1 : -1;
    return 0;
  });

  renderGrid(filtered);
}

function renderGrid(coins) {
  const grid  = document.getElementById('coinGrid');
  const loading = document.getElementById('loadingState');
  const empty   = document.getElementById('emptyState');

  Array.from(grid.children).forEach(el => { if (!el.id) el.remove(); });
  loading.style.display = 'none';

  if (coins.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  const frag = document.createDocumentFragment();
  coins.forEach((coin, i) => frag.appendChild(createCard(coin, i)));
  grid.appendChild(frag);
}

function createCard(coin, idx) {
  const signal = coin.signal || 'HOLD';
  const conf   = Math.round(coin.confidence || 0);
  const c24    = coin.change_24h;
  const c7d    = coin.change_7d;
  const sent   = coin.sentiment_score || 0;

  const div = document.createElement('div');
  div.className = `coin-card ${signal === 'BUY' ? 'buy-card' : signal === 'SELL' ? 'sell-card' : 'hold-card'}`;
  div.style.animationDelay = `${Math.min(idx * 25, 400)}ms`;

  const logoHtml = coin.image_url
    ? `<img class="coin-logo" src="${coin.image_url}" alt="${coin.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';
  const placeholder = `<div class="coin-logo-placeholder" style="${coin.image_url ? 'display:none' : ''}">${coin.symbol.slice(0,2)}</div>`;

  div.innerHTML = `
    <div class="card-top">
      ${logoHtml}${placeholder}
      <div class="coin-name-wrap">
        <div class="coin-name">${coin.name}</div>
        <div class="coin-ticker">$${coin.symbol}</div>
      </div>
      <div class="coin-rank">#${coin.market_cap_rank || '—'}</div>
    </div>

    <div class="price-row">
      <span class="coin-price">${formatPrice(coin.price_usd)}</span>
      ${changeBadge(c24, '24u')}
      ${changeBadge(c7d, '7d')}
    </div>

    <div class="metrics-row">
      <div class="metric">
        <div class="metric-label">Sentiment</div>
        <div class="metric-value" style="color:${sentColor(sent)}">${sent > 0 ? '+' : ''}${sent.toFixed(0)}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Market Cap</div>
        <div class="metric-value">${formatCap(coin.market_cap)}</div>
      </div>
    </div>

    <button class="signal-btn signal-${signal}">
      ${signalEmoji(signal)} ${signalLabel(signal)}
    </button>

    <div class="conf-wrap">
      <span class="conf-label">Confidence</span>
      <div class="conf-track"><div class="conf-fill conf-fill-${signal}" style="width:${conf}%"></div></div>
      <span class="conf-value">${conf}%</span>
    </div>

    ${coin.explanation ? `<div class="explanation">${coin.explanation}</div>` : ''}
  `;

  return div;
}

function formatPrice(p) {
  if (p == null) return '—';
  if (p >= 1000) return '$' + p.toLocaleString('nl-NL', {maximumFractionDigits: 0});
  if (p >= 1)    return '$' + p.toLocaleString('nl-NL', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  if (p >= 0.01) return '$' + p.toLocaleString('nl-NL', {minimumFractionDigits: 4, maximumFractionDigits: 4});
  return '$' + p.toExponential(3);
}

function formatCap(v) {
  if (v == null) return '—';
  if (v >= 1e12) return '$' + (v / 1e12).toFixed(1) + 'T';
  if (v >= 1e9)  return '$' + (v / 1e9).toFixed(1) + 'B';
  if (v >= 1e6)  return '$' + (v / 1e6).toFixed(0) + 'M';
  return '$' + v.toLocaleString();
}

function changeBadge(val, label) {
  if (val == null) return '';
  const cls = val > 0 ? 'change-pos' : val < 0 ? 'change-neg' : 'change-neu';
  const sign = val > 0 ? '+' : '';
  return `<span class="change-badge ${cls}">${sign}${val.toFixed(2)}% ${label}</span>`;
}

function sentColor(v) {
  if (v > 10) return 'var(--buy)';
  if (v < -10) return 'var(--sell)';
  return 'var(--muted)';
}

function signalEmoji(s) {
  return s === 'BUY' ? '🟢' : s === 'SELL' ? '🔴' : '🟣';
}

function signalLabel(s) {
  return s === 'BUY' ? 'KOOP' : s === 'SELL' ? 'VERKOOP' : 'HOUDEN';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
